<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Analysis – BowlerStats</title>
<meta name="description" content="Detailed over-by-over bowling analysis for IPL matches on BowlerStats.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#253047;
  --gold:#f5c518;--red:#ef4444;--green:#22c55e;--text:#e2e8f0;--muted:#94a3b8;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--surface);border-bottom:2px solid var(--gold);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--text);text-decoration:none}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:4px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 10px;border-radius:6px;transition:all .2s}
.nav-links a:hover,.nav-links a.act{color:var(--gold);background:rgba(245,197,24,.1)}
main{max-width:860px;margin:0 auto;padding:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:14px;padding:7px 12px;border:1px solid var(--border);border-radius:8px;transition:all .2s}
.back-btn:hover{color:var(--gold);border-color:var(--gold)}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.match-header{background:linear-gradient(90deg,#1a2235,#1e2d45);padding:14px 16px;border-bottom:1px solid var(--border)}
.match-teams{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,36px);letter-spacing:3px}
.match-meta{color:var(--muted);font-size:11px;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.result-badge{display:inline-block;border:1.5px solid var(--gold);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;margin-top:6px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.stat-box{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.stat-box:last-child{border-right:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);line-height:1}
.stat-val.red{color:var(--red)}
.stat-lbl{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.innings-block{padding:14px 14px 0}
.innings-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.chart-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.histogram{display:flex;align-items:flex-end;gap:3px;height:140px;min-width:min-content;padding:0 2px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px;flex:1}
.bar-runs{font-size:8px;font-weight:700;color:var(--text);min-height:12px}
.bar-fill{width:100%;border-radius:2px 2px 0 0;position:relative;cursor:pointer;transition:filter .2s}
.bar-fill:hover,.bar-fill:active{filter:brightness(1.35)}
.bar-fill.n{background:linear-gradient(180deg,#f5c518,#d4a800)}
.bar-fill.w{background:linear-gradient(180deg,#ef4444,#b91c1c)}
.bar-fill.d{background:linear-gradient(180deg,#22c55e,#15803d)}
.wicket-dot{width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff;position:absolute;top:-5px;left:50%;transform:translateX(-50%)}
.bar-over{font-size:8px;color:var(--muted)}
.bar-bowler{font-size:7px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:28px;text-align:center}
.legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;padding-bottom:2px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.commentary-box{background:rgba(245,197,24,.07);border-left:3px solid var(--gold);padding:10px 12px;margin:12px 14px 14px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.7;color:var(--text)}
.commentary-box::before{content:"💬 Commentary: ";font-weight:700;color:var(--gold)}
/* BOWLER TABLE */
.tbl-wrap{overflow-x:auto;margin:0 14px 14px;border-radius:8px;border:1px solid var(--border)}
.tbl-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:10px 12px 6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface);color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.ad-box{background:var(--surface);border:1px dashed var(--border);border-radius:8px;text-align:center;padding:12px;color:var(--muted);font-size:10px;margin:12px 0}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
#tip{position:fixed;background:#0d1526;border:1px solid var(--gold);color:var(--text);font-size:11px;padding:7px 10px;border-radius:8px;pointer-events:none;z-index:999;display:none;max-width:160px;line-height:1.6}
#tip strong{color:var(--gold)}
footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 16px;text-align:center;color:var(--muted);font-size:12px;margin-top:40px}
.foot-links{display:flex;justify-content:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.foot-links a{color:var(--muted);text-decoration:none}
.foot-links a:hover{color:var(--gold)}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-box:nth-child(2){border-right:none}
  .stat-box:nth-child(3){border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">BOWLER<span>STATS</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="matches.html" class="act">Matches</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
  <a class="back-btn" href="matches.html">&#8592; All Matches</a>
  <div class="ad-box">Advertisement</div>
  <div id="content"><div class="loading"><div class="spinner"></div>Loading match...</div></div>
  <div class="ad-box">Advertisement</div>
</main>

<footer>
  <div class="foot-links">
    <a href="index.html">Home</a>
    <a href="matches.html">Matches</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
  <p>© 2025 BowlerStats &middot; bowlerstat@gmail.com</p>
</footer>

<div id="tip"></div>

<script>
function calcStats(overs) {
  var runs = 0, wkts = 0, worst = {over:0, runs:0};
  for (var i = 0; i < overs.length; i++) {
    runs += overs[i].runs;
    wkts += (overs[i].wickets || 0);
    if (overs[i].runs > worst.runs) worst = overs[i];
  }
  var eco = overs.length ? (runs / overs.length).toFixed(1) : '0.0';
  return {runs:runs, wkts:wkts, eco:eco, worst:worst};
}

function buildBars(overs) {
  var max = 1;
  for (var i = 0; i < overs.length; i++) { if (overs[i].runs > max) max = overs[i].runs; }
  var html = '<div class="chart-wrap"><div class="histogram">';
  for (var i = 0; i < overs.length; i++) {
    var o = overs[i];
    var h = Math.max(Math.round((o.runs / max) * 120), 10);
    var cls = (o.wickets > 0) ? 'w' : (o.runs === 0) ? 'd' : 'n';
    var bowlerShort = o.bowler ? o.bowler.split(' ').slice(-1)[0].substring(0, 6) : '';
    var wd = (o.wickets > 0) ? '<div class="wicket-dot"></div>' : '';
    html += '<div class="bar-group">';
    html += '<div class="bar-runs">' + o.runs + '</div>';
    html += '<div class="bar-fill ' + cls + '" style="height:' + h + 'px" data-over="' + o.over + '" data-runs="' + o.runs + '" data-wkts="' + (o.wickets||0) + '" data-bowler="' + (o.bowler||'') + '">' + wd + '</div>';
    html += '<div class="bar-over">O' + o.over + '</div>';
    html += '<div class="bar-bowler" title="' + (o.bowler||'') + '">' + bowlerShort + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  html += '<div class="legend"><div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Normal</div><div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Wicket</div><div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Dot over</div></div>';
  return html;
}

function buildBowlerTable(overs) {
  var map = {};
  for (var i = 0; i < overs.length; i++) {
    var b = overs[i].bowler || 'Unknown';
    if (!map[b]) map[b] = {overs:0, runs:0, wkts:0};
    map[b].overs++;
    map[b].runs += overs[i].runs;
    map[b].wkts += (overs[i].wickets || 0);
  }
  var rows = '';
  var keys = Object.keys(map);
  for (var i = 0; i < keys.length; i++) {
    var b = keys[i], s = map[b];
    var eco = (s.runs / s.overs).toFixed(1);
    rows += '<tr><td>' + b + '</td><td>' + s.overs + '</td><td>' + s.runs + '</td><td>' + s.wkts + '</td><td>' + eco + '</td></tr>';
  }
  return '<div class="tbl-title">Bowler Summary</div><div class="tbl-wrap"><table><tr><th>Bowler</th><th>Overs</th><th>Runs</th><th>Wkts</th><th>Econ</th></tr>' + rows + '</table></div>';
}

async function loadMatch() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var el = document.getElementById('content');
  if (!id) { el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">No match ID in URL.</p>'; return; }
  document.title = id.replace(/-/g, ' ').toUpperCase() + ' – BowlerStats';
  try {
    var r = await fetch('matches/' + id + '.json?nc=' + Date.now());
    if (!r.ok) throw new Error('not found');
    var data = await r.json();

    // Overall stats across all innings
    var allOvers = [];
    for (var i = 0; i < data.innings.length; i++) {
      for (var j = 0; j < data.innings[i].overs.length; j++) {
        allOvers.push(data.innings[i].overs[j]);
      }
    }
    var s = calcStats(allOvers);

    var html = '<div class="match-card">';
    html += '<div class="match-header">';
    html += '<div class="match-teams">' + data.team1 + ' VS ' + data.team2 + '</div>';
    html += '<div class="match-meta"><span>&#128205; ' + (data.venue||'') + '</span><span>&#128197; ' + (data.date||'') + '</span></div>';
    if (data.result) html += '<div><span class="result-badge">' + data.result + '</span></div>';
    html += '</div>';
    html += '<div class="stats-row">';
    html += '<div class="stat-box"><div class="stat-val">' + s.runs + '</div><div class="stat-lbl">Total Runs</div></div>';
    html += '<div class="stat-box"><div class="stat-val">' + s.wkts + '</div><div class="stat-lbl">Wickets</div></div>';
    html += '<div class="stat-box"><div class="stat-val">' + s.eco + '</div><div class="stat-lbl">Avg Economy</div></div>';
    html += '<div class="stat-box"><div class="stat-val red">' + s.worst.runs + '<span style="font-size:12px"> O' + s.worst.over + '</span></div><div class="stat-lbl">Worst Over</div></div>';
    html += '</div>';

    for (var i = 0; i < data.innings.length; i++) {
      var inn = data.innings[i];
      var ordinal = (i === 0) ? '1st' : '2nd';
      html += '<div class="innings-block">';
      html += '<div class="innings-label">' + ordinal + ' Innings &mdash; ' + inn.bowlingTeam + ' bowling vs ' + inn.battingTeam + ' &mdash; ' + inn.overs.length + ' overs</div>';
      html += buildBars(inn.overs);
      html += '</div>';
      if (inn.commentary) {
        html += '<div class="commentary-box">' + inn.commentary + '</div>';
      }
      html += buildBowlerTable(inn.overs);
    }

    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Match not found. Check the match ID in the URL.</p>';
  }
}

document.addEventListener('mousemove', function(e) {
  var bar = e.target.closest ? e.target.closest('.bar-fill') : null;
  var tip = document.getElementById('tip');
  if (bar) {
    tip.innerHTML = '<strong>Over ' + bar.dataset.over + '</strong><br>Runs: ' + bar.dataset.runs + '<br>Wickets: ' + bar.dataset.wkts + '<br>Bowler: ' + (bar.dataset.bowler || 'N/A');
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  } else {
    tip.style.display = 'none';
  }
});
document.addEventListener('click', function(e) {
  var bar = e.target.closest ? e.target.closest('.bar-fill') : null;
  var tip = document.getElementById('tip');
  if (bar) {
    tip.innerHTML = '<strong>Over ' + bar.dataset.over + '</strong><br>Runs: ' + bar.dataset.runs + '<br>Wickets: ' + bar.dataset.wkts + '<br>Bowler: ' + (bar.dataset.bowler || 'N/A');
    tip.style.display = 'block';
    tip.style.left = '50%';
    tip.style.top = '70px';
    tip.style.transform = 'translateX(-50%)';
    setTimeout(function(){ tip.style.display = 'none'; }, 3000);
  }
});

loadMatch();
</script>
</body>
</html>
